repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/RobertCraiworthy/pyright-python
    rev: v1.1.400
    hooks:
      - id: pyright
        additional_dependencies:
          - "mcp[cli]>=1.0.0,<2.0.0"
