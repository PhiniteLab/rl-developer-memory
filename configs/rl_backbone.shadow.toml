# RL backbone experiment template (shadow posture).
# Helper config only; live MCP runtime authority remains ~/.codex/config.toml.

experiment_name = "rl-shadow-baseline"
algorithm = "sac"
rollout_posture = "shadow"
project_scope = "rl-developer-memory"
train_env_id = "deterministic-bandit-v0"
eval_env_id = "deterministic-bandit-v0"
problem_family = "safe_rl"
dynamics_class = "discrete_time"
state_dimension = 1
action_dimension = 1

[training]
seed = 7
discount = 0.95
learning_rate = 0.1
max_steps = 12
plateau_patience = 4
early_stop_min_delta = 0.001
gradient_clip = 0.5
reward_scale = 1.0
advantage_scale = 1.0
target_update_tau = 0.5
entropy_temperature = 0.1

[evaluation]
episodes = 3
required_seed_count = 3
production_min_seed_count = 5
baseline_names = ["scalar-baseline"]

[theory]
theorem_claim_type = "bellman_consistency"
assumptions = ["markov_transition", "bounded_reward", "stationary_rollout", "differentiable_policy"]
documented_hidden_assumptions = ["observation_sufficiency", "control_objective_well_posed", "replay_distribution_matched", "target_network_lag_controlled"]
lyapunov_candidate = "quadratic_energy"
notation_profile = "default"
audit_hooks = ["lyapunov_hook", "hjb_hook", "constraint_hook"]
artifact_expectations = ["checkpoint_state", "checkpoint_metadata", "theory_mapping_doc", "training_report", "evaluation_report"]
ablation_axes = ["training.seed", "training.reward_scale", "training.gradient_clip", "training.entropy_temperature"]
variance_budget = 1.0

[checkpoint]
root_dir = ".artifacts/rl_backbone/shadow"
save_every_steps = 3
keep_last = 3
resume_from = ""

[rollout_gate_status]
shadow_health_clean = false
benchmarks_stable = false
review_backlog_managed = false

[metadata]
note = "Example helper config only; live authority remains ~/.codex/config.toml."
