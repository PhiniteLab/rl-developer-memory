name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Ruff
        run: ruff check .

      - name: Pyright
        run: pyright

      - name: Pytest
        run: python -m pytest

      - name: Smoke
        run: python -m rl_developer_memory.maintenance smoke

      - name: Build
        run: python -m build

  rollout-readiness:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev]
          python -m pip install build

      - name: Extended rollout readiness checks
        run: python scripts/release_acceptance.py --extended-only --json
